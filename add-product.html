<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة منتج جديد - رزقي هب</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap');
        :root {
            --primary-color: #4A5D40;
            --accent-color: #C5A065;
            --text-dark: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #e8e4dc;
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 650px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.96);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        h2 { text-align: center; color: var(--primary-color); margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-dark); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 10px;
            background: #fafafa; font-size: 15px; transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--primary-color); outline: none; background: #fff;
        }
        .file-upload { position: relative; width: 100%; }
        .file-upload input[type="file"] {
            position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; right: 0;
        }
        .file-upload-label {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 14px; border: 2px dashed #ccc; border-radius: 10px;
            background: #fafafa; color: #666; cursor: pointer; transition: 0.3s;
        }
        .file-upload:hover .file-upload-label { border-color: var(--primary-color); color: var(--primary-color); }
        .submit-btn {
            width: 100%; padding: 16px; background: var(--primary-color); color: white;
            border: none; border-radius: 10px; font-size: 17px; font-weight: 700;
            cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .submit-btn:hover { background: #3b4d32; }
        .submit-btn:disabled { background: #999; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; }
        .back-link:hover { color: var(--primary-color); }
        @media (max-width: 600px) {
            .container { margin: 20px auto; padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📦 إضافة منتج جديد</h2>
        <p class="subtitle">أضف تفاصيل منتجك ليراه العملاء فوراً</p>

        <form id="addProductForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>اسم المنتج *</label>
                <input type="text" id="productName" name="product_name" placeholder="مثال: عسل سدر جبلي" required>
            </div>

            <div class="form-group">
                <label>وصف المنتج *</label>
                <textarea id="description" name="description" rows="4" placeholder="اكتب وصفاً دقيقاً للمنتج، مكوناته، وطريقة استخدامه..." required></textarea>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>السعر (ريال) *</label>
                    <input type="number" id="price" name="price" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>رقم الجوال للتواصل</label>
                    <input type="tel" id="phone" name="phone" placeholder="05XXXXXXXX" pattern="05[0-9]{8}">
                </div>
            </div>

            <div class="form-group">
                <label>الفئة *</label>
                <select id="category" name="category" required>
                    <option value="">اختر الفئة...</option>
                    <option value="food">المنتجات الغذائية</option>
                    <option value="handicrafts">الحرف اليدوية</option>
                    <option value="sewing">الخياطة والتطريز</option>
                    <option value="personal_care">العناية الشخصية</option>
                </select>
            </div>

            <div class="form-group">
                <label>المنطقة (اختياري)</label>
                <input type="text" id="region" name="region" placeholder="مثال: الرياض، جدة...">
            </div>

            <div class="form-group">
                <label>الكلمات المفتاحية (اختياري)</label>
                <input type="text" id="tags" name="tags" placeholder="افصل بينها بفواصل: طبيعي، يدوي، عضوي">
            </div>

            <div class="form-group">
                <label>صور المنتج (يمكنك رفع أكثر من صورة)</label>
                <div class="file-upload">
                    <input type="file" id="productImages" name="images[]" accept="image/*" multiple>
                    <label for="productImages" class="file-upload-label" id="fileLabel">
                        📎 اضغط لاختيار الصور (JPG, PNG, WEBP)
                    </label>
                </div>
                <small style="color: #888; display: block; margin-top: 5px;">
                    ⚠️ الحد الأقصى: 5 صور، الحجم الأقصى: 2 ميجابايت لكل صورة
                </small>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">نشر المنتج</button>
        </form>

        <a href="index.html" class="back-link">← العودة للرئيسية</a>
    </div>

    <!-- ✅ كود الجافاسكربت المتوافق مع XAMPP -->
    <script>
        // عرض اسم الملف المختار
        document.getElementById('productImages').addEventListener('change', function(e) {
            const count = e.target.files.length;
            document.getElementById('fileLabel').textContent = count > 0 
                ? `✅ تم اختيار ${count} صورة` 
                : '📎 اضغط لاختيار الصور (JPG, PNG, WEBP)';
        });

        // معالجة إرسال النموذج
        document.getElementById('addProductForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const originalBtnText = btn.textContent;
            
            // التحقق من تسجيل الدخول
            const savedUser = localStorage.getItem('rizq_user');
            if (!savedUser) {
                alert('⚠️ يجب تسجيل الدخول أولاً لإضافة منتج');
                window.location.href = 'index.html';
                return;
            }
            
            const user = JSON.parse(savedUser);
            
            // التحقق من أن المستخدم أسرة منتجة
            if (user.role !== 'producer') {
                alert('⚠️ هذه الميزة متاحة للأسر المنتجة فقط');
                return;
            }
            
            btn.textContent = '🔄 جاري الرفع والنشر...';
            btn.disabled = true;

            try {
                // تحضير البيانات للإرسال
                const formData = new FormData();
                formData.append('product_name', document.getElementById('productName').value.trim());
                formData.append('description', document.getElementById('description').value.trim());
                formData.append('price', parseFloat(document.getElementById('price').value));
                formData.append('category', document.getElementById('category').value);
                formData.append('phone', document.getElementById('phone').value.trim());
                formData.append('region', document.getElementById('region').value.trim());
                formData.append('tags', document.getElementById('tags').value.trim());
                formData.append('family_id', user.id);
                
                // إضافة الصور
                const files = document.getElementById('productImages').files;
                for (let i = 0; i < files.length && i < 5; i++) {
                    formData.append('images[]', files[i]);
                }
                
                // إرسال الطلب إلى الخادم
                const response = await fetch('api/add-product.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ تم نشر منتجك بنجاح! سيظهر في الأقسام خلال لحظات.');
                    document.getElementById('addProductForm').reset();
                    document.getElementById('fileLabel').textContent = '📎 اضغط لاختيار الصور (JPG, PNG, WEBP)';
                    window.location.href = 'my-products.html';
                } else {
                    alert('❌ فشل النشر: ' + (result.message || 'حدث خطأ غير معروف'));
                }
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                alert('❌ حدث خطأ أثناء الاتصال بالخادم. تأكد من تشغيل Apache و MySQL');
            } finally {
                btn.textContent = originalBtnText;
                btn.disabled = false;
            }
        });

        // 🔒 حماية الصفحة: التحقق من تسجيل الدخول عند التحميل
        window.addEventListener('load', function() {
            const savedUser = localStorage.getItem('rizq_user');
            if (!savedUser) {
                alert('⚠️ يجب تسجيل الدخول أولاً لإضافة منتج.');
                window.location.href = 'index.html';
                return;
            }
            
            const user = JSON.parse(savedUser);
            if (user.role !== 'producer') {
                alert('⚠️ هذه الصفحة مخصصة للأسر المنتجة فقط');
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
