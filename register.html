<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل أسرة منتجة - رزقي هب</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap');
        :root {
            --primary-color: #4A5D40;
            --accent-color: #C5A065;
            --text-dark: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center 35%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #e8e4dc;
            min-height: 100vh;
            padding: 20px;
        }
        .back-btn {
            position: fixed; top: 25px; right: 40px;
            background: rgba(255, 255, 255, 0.9); border: none;
            padding: 10px 25px; border-radius: 8px; cursor: pointer;
            font-weight: 700; color: var(--text-dark); text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100;
        }
        .back-btn:hover { background: var(--primary-color); color: white; }
        .register-container {
            max-width: 520px; margin: 100px auto 40px;
            background: rgba(255, 255, 255, 0.96); padding: 40px;
            border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .register-container h2 { text-align: center; color: var(--primary-color); margin-bottom: 8px; }
        .register-container p.subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .type-selector {
            display: flex; gap: 10px; margin-bottom: 30px; background: #f5f5f5;
            padding: 5px; border-radius: 12px;
        }
        .type-option {
            flex: 1; padding: 14px; text-align: center; cursor: pointer;
            border-radius: 8px; font-weight: 700; font-size: 15px; transition: 0.3s;
            border: 2px solid transparent; color: #555;
        }
        .type-option:hover { background: #eee; }
        .type-option.active {
            background: var(--primary-color); color: white;
            border-color: var(--primary-color); box-shadow: 0 4px 12px rgba(74, 93, 64, 0.3);
        }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-dark); font-size: 14px; }
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="tel"],
        .form-group input[type="password"] {
            width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 10px;
            background: #fafafa; font-size: 15px; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary-color); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(74,93,64,0.1); }
        
        /* 🎨 تصميم حاوية كلمة المرور مع أيقونة العين */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input {
            padding-left: 50px !important;
        }
        .toggle-password {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            transition: all 0.3s ease;
            background: transparent;
            border: none;
            padding: 0;
        }
        .toggle-password:hover {
            color: var(--primary-color);
            background: rgba(74, 93, 64, 0.1);
        }
        .toggle-password svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }
        .toggle-password:hover svg {
            transform: scale(1.15);
        }
        
        .file-upload { position: relative; display: inline-block; width: 100%; }
        .file-upload input[type="file"] {
            position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; right: 0;
        }
        .file-upload-label {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 14px; border: 2px dashed #ccc; border-radius: 10px;
            background: #fafafa; color: #666; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .file-upload:hover .file-upload-label { border-color: var(--primary-color); color: var(--primary-color); background: #f9fbf8; }
        .submit-btn {
            width: 100%; padding: 16px; background: var(--primary-color); color: white;
            border: none; border-radius: 10px; font-size: 17px; font-weight: 700;
            cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .submit-btn:hover { background: #3b4d32; transform: translateY(-2px); }
        .submit-btn:disabled { background: #999; cursor: not-allowed; transform: none; }
        .note { font-size: 12px; color: #888; margin-top: 20px; text-align: center; line-height: 1.6; }
        
        /* رسالة التنبيه */
        .alert-box {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            max-width: 400px;
            text-align: center;
        }
        .alert-box.show { display: block; }
        .alert-box.error { border-top: 5px solid #d9534f; }
        .alert-box.success { border-top: 5px solid #5cb85c; }
        .alert-box.warning { border-top: 5px solid #f0ad4e; }
        .alert-box h3 { margin-bottom: 15px; color: var(--primary-color); }
        .alert-box button {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .overlay.show { display: block; }
        
        @media (max-width: 600px) {
            .register-container { margin: 90px 15px 30px; padding: 25px; }
            .type-selector { flex-direction: column; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← العودة للرئيسية</a>

    <div class="register-container">
        <h2>إنشاء حساب جديد</h2>
        <p class="subtitle">اختر نوع الحساب للمتابعة</p>

        <div class="type-selector">
            <div class="type-option active" onclick="selectType('producer')">تسجيل كأسرة منتجة</div>
            <div class="type-option" onclick="selectType('customer')">تسجيل كعميل</div>
            <div class="type-option" onclick="selectType('driver')">تسجيل كمندوب توصيل 🚗</div>
        </div>

        <form id="registerForm">
            <input type="hidden" id="accountType" value="producer">

            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="أدخل الاسم كما في الهوية" required>
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="8 أحرف على الأقل" required minlength="8">
                    <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="إظهار/إخفاء كلمة المرور">
                        <!-- أيقونة العين المغلقة (الوضع الافتراضي) -->
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>رقم الجوال</label>
                <input type="tel" id="phone" placeholder="05XXXXXXXX" pattern="[0-9]{10}" required>
            </div>

            <div class="form-group" id="docField">
                <label>صورة من تصريح وثيقة العمل الحر</label>
                <div class="file-upload">
                    <input type="file" id="docUpload" accept="image/*,.pdf">
                    <label for="docUpload" class="file-upload-label" id="fileLabel">
                        📎 اضغط لرفع الملف (صورة أو PDF)
                    </label>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">إنشاء حساب الأسرة المنتجة</button>
            <p class="note">️ بياناتك آمنة ومشفرة. سيتم مراجعة طلب الأسرة المنتجة قبل التفعيل.</p>
        </form>
    </div>

    <!-- رسالة التنبيه -->
    <div class="overlay" id="overlay"></div>
    <div class="alert-box" id="alertBox">
        <h3 id="alertTitle">تنبيه</h3>
        <p id="alertMessage"></p>
        <button onclick="closeAlert()">حسناً</button>
    </div>

    <!-- 🟢 مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 🔑 إعدادات Supabase
        const SUPABASE_URL = 'https://yzqahzwqwcxypryzarxk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_qW1pvyy3MogDo5ZgK8JQQQ_w3mO0phv';
        
        // ⚙️ تهيئة Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 👁️ دالة إظهار/إخفاء كلمة المرور
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            // SVG لأيقونة العين المفتوحة
            const eyeOpenSVG = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            `;
            
            // SVG لأيقونة العين المغلقة (مع خط الشطب)
            const eyeClosedSVG = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            `;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = eyeOpenSVG;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = eyeClosedSVG;
            }
        }

        // 🔄 التبديل بين نوعي الحساب
        function selectType(type) {
            document.getElementById('accountType').value = type;
            const options = document.querySelectorAll('.type-option');
            options[0].classList.toggle('active', type === 'producer');
            options[1].classList.toggle('active', type === 'customer');
            options[2].classList.toggle('active', type === 'driver'); // ✅ إضافة جديدة

            const docField = document.getElementById('docField');
            const submitBtn = document.getElementById('submitBtn');
            
            if (type === 'producer') {
                docField.style.display = 'block';
                submitBtn.textContent = 'إنشاء حساب الأسرة المنتجة';
            } else if (type === 'driver') {
                // ✅ توجيه لمندوبي التوصيل
                window.location.href = 'register-driver.html';
                return;
            } else {
                docField.style.display = 'none';
                submitBtn.textContent = 'إنشاء حساب عميل';
            }
        }

        // 📎 عرض اسم الملف المختار
        document.getElementById('docUpload').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            if (fileName) {
                document.getElementById('fileLabel').textContent = '📄 ' + fileName;
                document.getElementById('fileLabel').style.color = '#4A5D40';
            } else {
                document.getElementById('fileLabel').textContent = '📎 اضغط لرفع الملف (صورة أو PDF)';
                document.getElementById('fileLabel').style.color = '#666';
            }
        });

        // 📝 معالجة التسجيل
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.textContent = 'جاري المعالجة...';
            btn.disabled = true;

            try {
                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const phone = document.getElementById('phone').value;
                const role = document.getElementById('accountType').value;
                const fileInput = document.getElementById('docUpload');

                console.log('Starting registration for:', email);

                // 1️ إنشاء حساب المستخدم في Supabase
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            phone: phone,
                            role: role
                        }
                    }
                });

                if (authError) {
                    throw authError;
                }

                console.log('User created:', authData);

                const userId = authData.user.id;

                // 2️⃣ رفع الوثيقة إذا وجدت
                let docUrl = '';
                if (role === 'producer' && fileInput.files[0]) {
                    try {
                        const file = fileInput.files[0];
                        const fileExt = file.name.split('.').pop();
                        const fileName = `${userId}/${Date.now()}.${fileExt}`;
                        
                        const { data: uploadData, error: uploadError } = await supabaseClient.storage
                            .from('user_documents')
                            .upload(fileName, file);

                        if (uploadError) {
                            throw uploadError;
                        }

                        // الحصول على الرابط العام للملف
                        const { data: { publicUrl } } = supabaseClient.storage
                            .from('user_documents')
                            .getPublicUrl(fileName);

                        docUrl = publicUrl;
                        console.log('File uploaded:', docUrl);
                    } catch (fileError) {
                        console.error('File upload error:', fileError);
                        showAlert('warning', '⚠️ تم إنشاء الحساب لكن فشل رفع الوثيقة. يمكنك إضافتها لاحقاً.');
                    }
                }

                // 3️⃣ حفظ البيانات في جدول users (إذا كان موجوداً)
                // ملاحظة: Supabase يحفظ البيانات الأساسية في auth.users تلقائياً
                // يمكنك إنشاء جدول إضافي للبيانات الإضافية إذا أردت
                try {
                    const { data: profileData, error: profileError } = await supabaseClient
                        .from('users')
                        .insert([
                            {
                                id: userId,
                                full_name: fullName,
                                email: email,
                                phone: phone,
                                role: role,
                                doc_url: docUrl || null,
                                is_approved: role === 'customer',
                                created_at: new Date().toISOString()
                            }
                        ]);

                    if (profileError) {
                        console.error('Profile creation error:', profileError);
                        // لا نوقف العملية إذا فشل إنشاء البروفايل
                    } else {
                        console.log('Profile created in database');
                    }
                } catch (dbError) {
                    console.error('Database error:', dbError);
                }

                // ✅ نجاح التسجيل
                showAlert('success', '✅ تم التسجيل بنجاح! سيتم توجيهك للصفحة الرئيسية...');
                
                // حفظ بيانات المستخدم في localStorage
                localStorage.setItem('rizq_user', JSON.stringify({
                    id: userId,
                    name: fullName,
                    email: email,
                    role: role
                }));
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Registration Error:', error);
                let errorMsg = 'حدث خطأ غير متوقع';
                
                if (error.message.includes('already registered')) {
                    errorMsg = 'البريد الإلكتروني مسجل مسبقاً. قم بتسجيل الدخول مباشرة.';
                } else if (error.message.includes('Password')) {
                    errorMsg = 'كلمة المرور ضعيفة جداً. استخدم 8 أحرف على الأقل مع أرقام وحروف.';
                } else if (error.message.includes('Invalid email')) {
                    errorMsg = 'البريد الإلكتروني غير صحيح';
                } else if (error.message.includes('CORS') || error.message.includes('Failed to fetch')) {
                    errorMsg = '⚠️ مشكلة في الاتصال. تأكد من:\n1. اتصال الإنترنت يعمل\n2. إعدادات Supabase صحيحة';
                } else {
                    errorMsg = error.message || 'حدث خطأ أثناء التسجيل';
                }
                
                showAlert('error', '❌ ' + errorMsg);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // دالة عرض التنبيهات
        function showAlert(type, message) {
            const alertBox = document.getElementById('alertBox');
            const overlay = document.getElementById('overlay');
            const alertTitle = document.getElementById('alertTitle');
            const alertMessage = document.getElementById('alertMessage');
            
            alertBox.className = 'alert-box show ' + type;
            overlay.classList.add('show');
            
            if (type === 'success') {
                alertTitle.textContent = 'نجح!';
            } else if (type === 'error') {
                alertTitle.textContent = 'خطأ';
            } else if (type === 'warning') {
                alertTitle.textContent = 'تنبيه';
            }
            
            alertMessage.textContent = message;
        }

        function closeAlert() {
            document.getElementById('alertBox').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
    </script>
</body>
</html>
