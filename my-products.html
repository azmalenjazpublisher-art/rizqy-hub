<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منتجاتي - رزقي هب</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap');

        :root {
            --primary-color: #4A5D40;
            --accent-color: #C5A065;
            --text-dark: #333;
            --success-color: #5cb85c;
            --danger-color: #d9534f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center 35%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #e8e4dc;
            min-height: 100vh;
            padding: 20px;
        }

        .back-btn {
            position: fixed;
            top: 25px;
            right: 40px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-dark);
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .back-btn:hover { background: var(--primary-color); color: white; }

        .container {
            max-width: 1200px;
            margin: 80px auto 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            color: var(--primary-color);
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 3px 15px rgba(0,0,0,0.08);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .add-btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            margin-bottom: 30px;
            border: none;
            cursor: pointer;
        }

        .add-btn:hover { background: #3b4d32; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #f4f1eb;
        }

        .product-info {
            padding: 20px;
        }

        .product-info h3 {
            font-size: 18px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .product-info .price {
            font-size: 20px;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .product-info .status {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 10px;
        }

        .status.approved {
            background: #d4edda;
            color: #155724;
        }

        .status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status.rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .product-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
        }

        .edit-btn {
            background: var(--accent-color);
            color: white;
        }

        .delete-btn {
            background: var(--danger-color);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state h2 {
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .empty-state a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← العودة للرئيسية</a>

    <div class="container">
        <div class="page-header">
            <h1> منتجاتي</h1>
            <p>إدارة وعرض جميع منتجاتك في منصة رزقي هب</p>
        </div>

        <div id="productsContent">
            <p class="loading">🔄 جاري تحميل منتجاتك...</p>
        </div>
    </div>

    <!-- 🟢 مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 🔑 إعدادات Supabase
        const SUPABASE_URL = 'https://yzqahzwqwcxypryzarxk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_qW1pvyy3MogDo5ZgK8JQQQ_w3mO0phv';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let myProducts = [];

        window.addEventListener('load', async function() {
            await loadMyProducts();
        });

        // تحميل منتجاتي
        async function loadMyProducts() {
            const container = document.getElementById('productsContent');
            
            try {
                // التحقق من تسجيل الدخول
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (!session) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h2>⚠️ يجب تسجيل الدخول</h2>
                            <p>سجّل دخولك لعرض منتجاتك</p>
                            <a href="login.html">تسجيل الدخول</a>
                        </div>
                    `;
                    return;
                }

                const userId = session.user.id;

                // التحقق من أن المستخدم أسرة منتجة
                const { data: userData } = await supabaseClient
                    .from('users')
                    .select('role, is_approved')
                    .eq('id', userId)
                    .single();

                if (!userData || userData.role !== 'producer') {
                    container.innerHTML = `
                        <div class="error-msg">
                            <h2>️ حسابك ليس حساب أسرة منتجة</h2>
                            <p>يجب أن تكون مسجلاً كأسرة منتجة لعرض هذه الصفحة</p>
                            <a href="index.html" style="display:inline-block; margin-top:15px; padding:10px 25px; background:var(--primary-color); color:white; text-decoration:none; border-radius:8px;">العودة للرئيسية</a>
                        </div>
                    `;
                    return;
                }

                if (!userData.is_approved) {
                    container.innerHTML = `
                        <div class="error-msg">
                            <h2>⏳ حسابك قيد المراجعة</h2>
                            <p>لم يتم اعتماد حسابك كأسرة منتجة بعد</p>
                            <p style="margin-top:10px; font-size:14px;">سيتم التواصل معك بعد الاعتماد</p>
                        </div>
                    `;
                    return;
                }

                // جلب المنتجات
                const { data: products, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                myProducts = products || [];
                displayProducts();

            } catch (err) {
                console.error('❌ خطأ:', err);
                container.innerHTML = `
                    <div class="error-msg">
                        <h2>❌ خطأ في تحميل المنتجات</h2>
                        <p>${err.message}</p>
                        <a href="index.html" style="display:inline-block; margin-top:15px; padding:10px 25px; background:var(--primary-color); color:white; text-decoration:none; border-radius:8px;">العودة للرئيسية</a>
                    </div>
                `;
            }
        }

        // عرض المنتجات
        function displayProducts() {
            const container = document.getElementById('productsContent');

            if (myProducts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2> لا توجد منتجات</h2>
                        <p>لم تقم بإضافة أي منتجات بعد</p>
                        <button class="add-btn" onclick="window.location.href='add-product.html'">➕ إضافة منتج جديد</button>
                    </div>
                `;
                return;
            }

            const approved = myProducts.filter(p => p.is_approved === true).length;
            const pending = myProducts.filter(p => !p.is_approved || p.is_approved === null).length;
            const rejected = myProducts.filter(p => p.is_approved === false).length;

            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>المنتجات المعتمدة</h3>
                        <div class="number" style="color:var(--success-color)">${approved}</div>
                    </div>
                    <div class="stat-card">
                        <h3>بانتظار الموافقة</h3>
                        <div class="number" style="color:var(--accent-color)">${pending}</div>
                    </div>
                    <div class="stat-card">
                        <h3>إجمالي المنتجات</h3>
                        <div class="number">${myProducts.length}</div>
                    </div>
                </div>

                <button class="add-btn" onclick="window.location.href='add-product.html'">➕ إضافة منتج جديد</button>

                <div class="products-grid">
            `;

            myProducts.forEach(product => {
                html += renderProductCard(product);
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // عرض بطاقة منتج
        function renderProductCard(product) {
            const statusClass = product.is_approved === true ? 'approved' : 
                               product.is_approved === false ? 'rejected' : 'pending';
            const statusText = product.is_approved === true ? '✅ معتمد' : 
                              product.is_approved === false ? '❌ مرفوض' : '⏳ قيد المراجعة';

            const imageUrl = product.image_url || 'images/categories/cat-food.webp';

            return `
                <div class="product-card">
                    <img src="${imageUrl}" alt="${product.name}" onerror="this.src='images/categories/cat-food.webp'">
                    <div class="product-info">
                        <span class="status ${statusClass}">${statusText}</span>
                        <h3>${product.name}</h3>
                        <div class="price">${parseFloat(product.price).toFixed(2)} ر.س</div>
                        <p style="color:#666; font-size:13px; margin-bottom:10px;">
                            ${product.description ? product.description.substring(0, 80) + '...' : ''}
                        </p>
                        <div style="font-size:13px; color:#888; margin-bottom:10px;">
                            📦 المخزون: ${product.stock || 0}
                        </div>
                        <div class="product-actions">
                            <button class="edit-btn" onclick="editProduct('${product.id}')">✏️ تعديل</button>
                            <button class="delete-btn" onclick="deleteProduct('${product.id}')">🗑 حذف</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // تعديل منتج
        function editProduct(productId) {
            alert('سيتم نقلك لصفحة تعديل المنتج #' + productId);
            // window.location.href = `edit-product.html?id=${productId}`;
        }

        // حذف منتج
        async function deleteProduct(productId) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;

            try {
                const { error } = await supabaseClient
                    .from('products')
                    .delete()
                    .eq('id', productId);

                if (error) throw error;

                alert('✅ تم حذف المنتج بنجاح');
                await loadMyProducts();
            } catch (err) {
                console.error('❌ خطأ:', err);
                alert('❌ فشل حذف المنتج: ' + err.message);
            }
        }
    </script>
</body>
</html>
